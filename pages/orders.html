<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders — Lobby Y2K</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <script src="/js/env.js"></script>
</head>
<body>
<nav class="nav" id="main-nav">
  <a href="/" class="nav__logo"><img src="https://res.cloudinary.com/duw82qno0/image/upload/v1782674045/C705ADF3-47CC-4FC6-A026-73B3F2F27355_ycltrb.png" alt="Lobby Y2K" /></a>
  <div class="nav__links">
    <a href="/" class="nav__link">Home</a><a href="/pages/search.html" class="nav__link">Shop</a>
  </div>
  <div class="nav__actions">
    <button class="nav__icon-btn" onclick="location.href='/pages/search.html'">🔍</button>
    <button class="nav__icon-btn" onclick="location.href='/pages/cart.html'" style="position:relative">🛒<span class="cart-badge" style="display:none">0</span></button>
    <button class="nav__icon-btn" id="theme-toggle" onclick="handleThemeToggle()">🌙</button>
    <button class="nav__icon-btn" id="auth-btn">👤</button>
  </div>
</nav>
<main class="page page-enter">
  <div class="container" style="padding-top:40px;padding-bottom:80px;max-width:860px">
    <div class="section-header" style="margin-bottom:32px">
      <div>
        <h1 class="section-title">My <span class="text-gradient">Orders</span></h1>
        <p class="section-subtitle">Track your purchases</p>
      </div>
      <a href="/pages/search.html" class="btn btn--outline btn--sm">Shop More</a>
    </div>
    <div id="orders-list"><div class="spinner" style="margin:60px auto;display:block"></div></div>
  </div>
</main>
<nav class="bottom-nav">
  <a href="/" class="bottom-nav__item"><span class="icon">🏠</span><span class="bottom-nav__label">Home</span></a>
  <a href="/pages/search.html" class="bottom-nav__item"><span class="icon">🔍</span><span class="bottom-nav__label">Shop</span></a>
  <a href="/pages/wishlist.html" class="bottom-nav__item"><span class="icon">♡</span><span class="bottom-nav__label">Saved</span></a>
  <a href="/pages/cart.html" class="bottom-nav__item" style="position:relative"><span class="icon">🛒</span><span class="cart-badge" style="display:none">0</span><span class="bottom-nav__label">Cart</span></a>
  <a href="/pages/profile.html" class="bottom-nav__item active" id="account-bottom"><span class="icon">👤</span><span class="bottom-nav__label">Account</span></a>
</nav>
<script type="module">
  import { initTheme, toggleTheme, updateCartBadge, formatPrice, statusBadgeHTML, formatDate, toast } from '/js/utils/helpers.js';
  import { supabase } from '/js/supabase.js';
  import { OrdersService } from '/js/services/orders.js';
  import { refreshNavAuth } from '/js/utils/page-shell.js';

  initTheme();
  document.getElementById('theme-toggle').textContent = (localStorage.getItem('lobby-theme')||'dark') === 'dark' ? '🌙' : '☀️';
  window.handleThemeToggle = () => { const n = toggleTheme(); document.getElementById('theme-toggle').textContent = n === 'dark' ? '🌙' : '☀️'; };
  window.addEventListener('scroll', () => document.getElementById('main-nav').classList.toggle('scrolled', scrollY > 20), { passive: true });

  const { data: { user } } = await supabase.auth.getUser();
  if (!user) location.href = `/pages/login.html?redirect=${encodeURIComponent(location.href)}`;
  refreshNavAuth();
  updateCartBadge();

  const container = document.getElementById('orders-list');
  try {
    const orders = await OrdersService.getMyOrders();
    if (!orders.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state__icon">📦</div>
          <h3 class="empty-state__title">No orders yet</h3>
          <p class="empty-state__sub">Once you place an order, you'll be able to track it here.</p>
          <button class="btn btn--primary" onclick="location.href='/pages/search.html'">Start Shopping</button>
        </div>`;
      return;
    }

    container.innerHTML = orders.map(order => {
      const itemCount = order.order_items?.reduce((s,i)=>s+i.quantity,0) || 0;
      const firstImg  = order.order_items?.[0]?.product_images?.find(i=>i.is_primary)?.url || '';
      return `
        <div onclick="location.href='/pages/order-detail.html?id=${order.id}'" style="
          background:var(--surface-1);border:1px solid var(--border);border-radius:var(--radius-lg);
          padding:24px;margin-bottom:16px;cursor:pointer;transition:all var(--dur-mid) var(--ease-spring)
        "
        onmouseenter="this.style.transform='translateY(-2px)';this.style.borderColor='var(--border-mid)'"
        onmouseleave="this.style.transform='';this.style.borderColor='var(--border)'">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap">
            <div>
              <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">
                Order #${order.id.slice(0,8).toUpperCase()}
              </div>
              <div style="font-size:13px;color:var(--text-muted)">${formatDate(order.created_at)} · ${itemCount} item${itemCount !== 1 ? 's' : ''}</div>
            </div>
            <div style="display:flex;align-items:center;gap:12px">
              ${statusBadgeHTML(order.status)}
              <span style="font-family:var(--font-display);font-size:1.1rem;font-weight:800">${formatPrice(order.total)}</span>
            </div>
          </div>
          ${order.order_items?.length ? `
            <div style="display:flex;gap:10px;margin-top:16px;overflow:hidden">
              ${order.order_items.slice(0,4).map(item => {
                const img = item.product_images?.find(i=>i.is_primary)?.url || item.product_images?.[0]?.url || '';
                return `<div style="width:56px;height:56px;border-radius:var(--radius-md);background:var(--surface-2);overflow:hidden;flex-shrink:0">
                  ${img ? `<img src="${img}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'" />` : ''}
                </div>`;
              }).join('')}
              ${order.order_items.length > 4 ? `<div style="width:56px;height:56px;border-radius:var(--radius-md);background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--text-muted)">+${order.order_items.length-4}</div>` : ''}
            </div>
          ` : ''}
        </div>
      `;
    }).join('');
  } catch(e) {
    container.innerHTML = `<p style="color:var(--danger)">${e.message}</p>`;
  }
</script>
</body>
</html>
