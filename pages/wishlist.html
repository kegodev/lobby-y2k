<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wishlist — Lobby Y2K</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <script src="/js/env.js"></script>
</head>
<body>
<nav class="nav" id="main-nav">
  <a href="/" class="nav__logo"><img src="https://res.cloudinary.com/duw82qno0/image/upload/v1782674045/C705ADF3-47CC-4FC6-A026-73B3F2F27355_ycltrb.png" alt="Lobby Y2K" /></a>
  <div class="nav__links"><a href="/" class="nav__link">Home</a><a href="/pages/search.html" class="nav__link">Shop</a></div>
  <div class="nav__actions">
    <button class="nav__icon-btn" onclick="location.href='/pages/search.html'">🔍</button>
    <button class="nav__icon-btn" onclick="location.href='/pages/cart.html'" style="position:relative">🛒<span class="cart-badge" style="display:none">0</span></button>
    <button class="nav__icon-btn" id="theme-toggle" onclick="handleThemeToggle()">🌙</button>
    <button class="nav__icon-btn" id="auth-btn">👤</button>
  </div>
</nav>
<main class="page page-enter">
  <div class="container" style="padding-top:40px;padding-bottom:80px">
    <div class="section-header" style="margin-bottom:32px">
      <div>
        <h1 class="section-title">My <span class="text-gradient">Wishlist</span></h1>
        <p class="section-subtitle" id="wishlist-count">Loading…</p>
      </div>
    </div>
    <div class="product-grid" id="wishlist-grid"></div>
  </div>
</main>
<nav class="bottom-nav">
  <a href="/" class="bottom-nav__item"><span class="icon">🏠</span><span class="bottom-nav__label">Home</span></a>
  <a href="/pages/search.html" class="bottom-nav__item"><span class="icon">🔍</span><span class="bottom-nav__label">Shop</span></a>
  <a href="/pages/wishlist.html" class="bottom-nav__item active"><span class="icon">♡</span><span class="bottom-nav__label">Saved</span></a>
  <a href="/pages/cart.html" class="bottom-nav__item" style="position:relative"><span class="icon">🛒</span><span class="cart-badge" style="display:none">0</span><span class="bottom-nav__label">Cart</span></a>
  <a href="/pages/profile.html" class="bottom-nav__item" id="account-bottom"><span class="icon">👤</span><span class="bottom-nav__label">Account</span></a>
</nav>
<script type="module">
  import { initTheme, toggleTheme, updateCartBadge, productCardHTML, showSkeletons, formatPrice, toast, getPrimaryImage, getEffectivePrice, getDiscountPercent } from '/js/utils/helpers.js';
  import { supabase } from '/js/supabase.js';
  import { WishlistService } from '/js/services/misc.js';
  import CartService from '/js/services/cart.js';
  import { refreshNavAuth } from '/js/utils/page-shell.js';

  initTheme();
  document.getElementById('theme-toggle').textContent = (localStorage.getItem('lobby-theme')||'dark') === 'dark' ? '🌙' : '☀️';
  window.handleThemeToggle = () => { const n = toggleTheme(); document.getElementById('theme-toggle').textContent = n === 'dark' ? '🌙' : '☀️'; };
  window.addEventListener('scroll', () => document.getElementById('main-nav').classList.toggle('scrolled', scrollY > 20), { passive: true });

  const { data: { user } } = await supabase.auth.getUser();
  if (!user) location.href = `/pages/login.html?redirect=${encodeURIComponent(location.href)}`;
  refreshNavAuth();
  updateCartBadge();

  const grid  = document.getElementById('wishlist-grid');
  const count = document.getElementById('wishlist-count');

  showSkeletons(grid, 4);

  try {
    const items = await WishlistService.getWishlist();
    count.textContent = `${items.length} saved item${items.length !== 1 ? 's' : ''}`;

    if (!items.length) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-state__icon">♡</div>
          <h3 class="empty-state__title">Nothing saved yet</h3>
          <p class="empty-state__sub">Tap the heart on any sneaker to save it here.</p>
          <button class="btn btn--primary" onclick="location.href='/pages/search.html'">Browse Sneakers</button>
        </div>`;
      return;
    }

    grid.innerHTML = items.map(item => {
      const p = item.products;
      if (!p) return '';
      const img  = p.product_images?.find(i=>i.is_primary)?.url || p.product_images?.[0]?.url || '';
      const disc = getDiscountPercent(p);
      const price = p.sale_price || p.base_price;
      return `
        <article class="product-card" style="position:relative">
          <div class="product-card__image-wrap" onclick="location.href='/pages/product.html?id=${p.id}'" style="cursor:pointer">
            <img class="product-card__image" src="${img}" alt="${p.name}" loading="lazy"
              onerror="this.src='https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400'" />
            ${disc > 0 ? `<span class="badge badge--sale">-${disc}%</span>` : ''}
            <button class="wishlist-btn active" onclick="event.stopPropagation();removeWish('${p.id}',this)" style="color:var(--pink)">♥</button>
          </div>
          <div class="product-card__info">
            <span class="product-card__brand">${p.brand}</span>
            <h3 class="product-card__name">${p.name}</h3>
            <div class="product-card__meta">
              <span style="font-size:13px;color:var(--text-muted)">${p.review_count?.toLocaleString() || 0} reviews</span>
              <span class="current" style="font-family:var(--font-display);font-size:15px;font-weight:700">${formatPrice(price)}</span>
            </div>
            <button class="btn btn--primary btn--full" style="margin-top:12px;font-size:13px;padding:10px"
              onclick="location.href='/pages/product.html?id=${p.id}'">View Product</button>
          </div>
        </article>`;
    }).join('');

    window.removeWish = async (productId, btn) => {
      try {
        await WishlistService.removeFromWishlist(productId);
        toast('Removed from wishlist', 'info');
        btn.closest('article').style.opacity = '0.3';
        btn.closest('article').style.pointerEvents = 'none';
        setTimeout(() => location.reload(), 800);
      } catch(e) { toast(e.message,'error'); }
    };

  } catch(e) {
    grid.innerHTML = `<p style="color:var(--danger);grid-column:1/-1">${e.message}</p>`;
  }
</script>
</body>
</html>
