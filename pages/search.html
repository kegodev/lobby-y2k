<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop — Lobby Y2K</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <script src="/js/env.js"></script>
</head>
<body>

<nav class="nav" id="main-nav">
  <a href="/" class="nav__logo">
    <img src="https://res.cloudinary.com/duw82qno0/image/upload/v1782674045/C705ADF3-47CC-4FC6-A026-73B3F2F27355_ycltrb.png" alt="Lobby Y2K" />
  </a>
  <div class="nav__links">
    <a href="/" class="nav__link">Home</a>
    <a href="/pages/search.html" class="nav__link active">Shop</a>
    <a href="/pages/search.html?brand=Nike" class="nav__link">Nike</a>
    <a href="/pages/search.html?brand=Jordan" class="nav__link">Jordan</a>
    <a href="/pages/search.html?brand=Adidas" class="nav__link">Adidas</a>
  </div>
  <div class="nav__actions">
    <button class="nav__icon-btn" onclick="location.href='/pages/search.html'" aria-label="Search">🔍</button>
    <button class="nav__icon-btn" onclick="requireAuthNav('/pages/wishlist.html')" aria-label="Wishlist">♡</button>
    <button class="nav__icon-btn" onclick="requireAuthNav('/pages/cart.html')" style="position:relative" aria-label="Cart">
      🛒<span class="cart-badge" style="display:none">0</span>
    </button>
    <button class="nav__icon-btn" id="theme-toggle" onclick="handleThemeToggle()">🌙</button>
    <button class="nav__icon-btn" id="auth-btn">👤</button>
  </div>
</nav>

<main class="page page-enter">
  <div class="container" style="padding-top:40px;padding-bottom:80px">

    <!-- HEADER + SEARCH -->
    <div style="margin-bottom:32px">
      <h1 class="section-title" id="page-title">Shop All <span class="text-gradient">Sneakers</span></h1>
      <p class="section-subtitle" id="result-count" style="margin-top:8px">Loading…</p>
    </div>

    <div class="search-bar" style="margin-bottom:24px;max-width:100%">
      <span class="search-bar__icon">🔍</span>
      <input class="search-bar__input" type="text" id="search-input" placeholder="Search sneakers, brands, styles…" />
      <button class="search-bar__clear" id="clear-search" style="display:none">✕</button>
    </div>

    <!-- FILTER BAR -->
    <div class="filter-bar" id="filter-bar">
      <div style="display:flex;gap:8px;flex-wrap:wrap;flex:1" id="brand-chips"></div>
      <select class="sort-select" id="sort-select">
        <option value="created_at|desc">Newest</option>
        <option value="base_price|asc">Price: Low–High</option>
        <option value="base_price|desc">Price: High–Low</option>
        <option value="rating|desc">Top Rated</option>
      </select>
    </div>

    <!-- CATEGORY CHIPS -->
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px" id="cat-chips"></div>

    <!-- PRODUCT GRID -->
    <div class="product-grid" id="product-grid"></div>

    <!-- LOAD MORE / PAGINATION -->
    <div style="text-align:center;margin-top:40px" id="pagination-area"></div>

  </div>
</main>

<nav class="bottom-nav">
  <a href="/" class="bottom-nav__item"><span class="icon">🏠</span><span class="bottom-nav__label">Home</span></a>
  <a href="/pages/search.html" class="bottom-nav__item active"><span class="icon">🔍</span><span class="bottom-nav__label">Shop</span></a>
  <a href="/pages/wishlist.html" class="bottom-nav__item"><span class="icon">♡</span><span class="bottom-nav__label">Saved</span></a>
  <a href="/pages/cart.html" class="bottom-nav__item" style="position:relative"><span class="icon">🛒</span><span class="cart-badge" style="display:none">0</span><span class="bottom-nav__label">Cart</span></a>
  <a href="#" class="bottom-nav__item" id="account-bottom"><span class="icon">👤</span><span class="bottom-nav__label">Account</span></a>
</nav>

<script type="module">
  import { initTheme, toggleTheme, updateCartBadge, productCardHTML, showSkeletons, toast, debounce, formatPrice, getParam } from '/js/utils/helpers.js';
  import { supabase } from '/js/supabase.js';
  import ProductsService from '/js/services/products.js';
  import { refreshNavAuth } from '/js/utils/page-shell.js';

  initTheme();
  document.getElementById('theme-toggle').textContent = (localStorage.getItem('lobby-theme') || 'dark') === 'dark' ? '🌙' : '☀️';
  window.handleThemeToggle = () => { const n = toggleTheme(); document.getElementById('theme-toggle').textContent = n === 'dark' ? '🌙' : '☀️'; };
  window.addEventListener('scroll', () => document.getElementById('main-nav').classList.toggle('scrolled', scrollY > 20), { passive: true });

  // ── State ────────────────────────────────────────────────
  let currentPage   = 1;
  let totalProducts = 0;
  let loading       = false;
  const LIMIT       = 12;

  const state = {
    brand:    getParam('brand')    || '',
    category: getParam('category') || '',
    search:   getParam('search')   || '',
    sortBy:   'created_at',
    sortDir:  'desc',
  };

  // Update title based on brand filter
  if (state.brand) {
    document.getElementById('page-title').innerHTML = `${state.brand} <span class="text-gradient">Sneakers</span>`;
  }

  // Pre-fill search input
  if (state.search) document.getElementById('search-input').value = state.search;

  // ── Load filters ─────────────────────────────────────────
  async function loadFilterChips() {
    const [brands, cats] = await Promise.all([
      ProductsService.getBrands(),
      ProductsService.getCategories(),
    ]);

    const brandChips = document.getElementById('brand-chips');
    brandChips.innerHTML = `
      <span class="filter-chip ${!state.brand ? 'active' : ''}" data-brand="">All Brands</span>
      ${brands.map(b => `<span class="filter-chip ${state.brand === b ? 'active' : ''}" data-brand="${b}">${b}</span>`).join('')}
    `;
    brandChips.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        state.brand = chip.dataset.brand;
        brandChips.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        currentPage = 1;
        loadProducts();
      });
    });

    const catChips = document.getElementById('cat-chips');
    catChips.innerHTML = `
      <span class="filter-chip ${!state.category ? 'active' : ''}" data-cat="">All Styles</span>
      ${cats.map(c => `<span class="filter-chip ${state.category === c ? 'active' : ''}" data-cat="${c}">${c}</span>`).join('')}
    `;
    catChips.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        state.category = chip.dataset.cat;
        catChips.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        currentPage = 1;
        loadProducts();
      });
    });
  }

  // ── Load products ────────────────────────────────────────
  async function loadProducts(append = false) {
    if (loading) return;
    loading = true;

    const grid  = document.getElementById('product-grid');
    const pages = document.getElementById('pagination-area');

    if (!append) showSkeletons(grid, LIMIT);

    try {
      const { products, total } = await ProductsService.getProducts({
        brand:    state.brand    || undefined,
        category: state.category || undefined,
        search:   state.search   || undefined,
        sortBy:   state.sortBy,
        sortDir:  state.sortDir,
        page:     currentPage,
        limit:    LIMIT,
      });

      totalProducts = total;

      const html = products.map(p => productCardHTML(p)).join('');

      if (append) {
        grid.insertAdjacentHTML('beforeend', html);
      } else {
        grid.innerHTML = html || `
          <div class="empty-state" style="grid-column:1/-1">
            <div class="empty-state__icon">👟</div>
            <h3 class="empty-state__title">No sneakers found</h3>
            <p class="empty-state__sub">Try adjusting your filters or search term</p>
            <button class="btn btn--outline" onclick="clearFilters()">Clear Filters</button>
          </div>
        `;
      }

      const count   = document.getElementById('result-count');
      count.textContent = `${total.toLocaleString()} sneaker${total !== 1 ? 's' : ''} found`;

      // Pagination
      const totalPages = Math.ceil(total / LIMIT);
      if (totalPages > 1) {
        pages.innerHTML = `
          <button class="btn btn--outline" id="load-more-btn" ${currentPage >= totalPages ? 'disabled' : ''}>
            ${currentPage < totalPages ? 'Load More' : 'That\'s all'}
          </button>
          <p style="font-size:13px;color:var(--text-muted);margin-top:12px">
            Showing ${Math.min(currentPage * LIMIT, total)} of ${total}
          </p>
        `;
        document.getElementById('load-more-btn')?.addEventListener('click', () => {
          currentPage++;
          loadProducts(true);
        });
      } else {
        pages.innerHTML = '';
      }

    } catch (err) {
      grid.innerHTML = `<p style="color:var(--danger);grid-column:1/-1;text-align:center;padding:40px">Failed to load products: ${err.message}</p>`;
    }

    loading = false;
  }

  window.clearFilters = () => {
    state.brand = state.category = state.search = '';
    document.getElementById('search-input').value = '';
    currentPage = 1;
    loadProducts();
    loadFilterChips();
  };

  // ── Search ───────────────────────────────────────────────
  const searchInput = document.getElementById('search-input');
  const clearBtn    = document.getElementById('clear-search');

  const doSearch = debounce(() => {
    state.search = searchInput.value.trim();
    clearBtn.style.display = state.search ? 'block' : 'none';
    currentPage = 1;
    loadProducts();
  }, 350);

  searchInput.addEventListener('input', doSearch);
  clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    state.search      = '';
    clearBtn.style.display = 'none';
    currentPage = 1;
    loadProducts();
  });

  // ── Sort ─────────────────────────────────────────────────
  document.getElementById('sort-select').addEventListener('change', (e) => {
    const [sortBy, sortDir] = e.target.value.split('|');
    state.sortBy  = sortBy;
    state.sortDir = sortDir;
    currentPage   = 1;
    loadProducts();
  });

  // ── Init ─────────────────────────────────────────────────
  loadFilterChips();
  loadProducts();
  updateCartBadge();
</script>
</body>
</html>
