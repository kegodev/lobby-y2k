<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Lobby Y2K</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <script src="/js/env.js"></script>
</head>
<body>

<div class="auth-page">
  <div class="auth-page__visual">
    <div class="auth-page__visual-bg" style="background-image:url('https://images.unsplash.com/photo-1552346154-21d32810aba3?w=1200')"></div>
    <div class="auth-page__visual-content">
      <img src="https://res.cloudinary.com/duw82qno0/image/upload/v1782674045/C705ADF3-47CC-4FC6-A026-73B3F2F27355_ycltrb.png" style="height:48px;object-fit:contain;margin-bottom:32px" alt="Lobby Y2K" />
      <p class="auth-page__visual-title">No stress.<br/>We've got you.</p>
      <p class="auth-page__visual-sub">Reset your password and get back in the Lobby in seconds.</p>
    </div>
  </div>

  <div class="auth-page__form-side">
    <div class="auth-logo">
      <a href="/"><img src="https://res.cloudinary.com/duw82qno0/image/upload/v1782674045/C705ADF3-47CC-4FC6-A026-73B3F2F27355_ycltrb.png" alt="Lobby Y2K" /></a>
    </div>

    <!-- STEP 1: Request reset -->
    <div id="step-request">
      <h1 class="auth-title">Forgot password?</h1>
      <p class="auth-subtitle">Enter your email and we'll send a reset link</p>

      <form class="auth-form" id="forgot-form" onsubmit="return false">
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input class="form-input" type="email" id="email" placeholder="you@email.com" autocomplete="email" required />
          <span class="form-error" id="email-error"></span>
        </div>

        <button class="btn btn--primary btn--full" type="submit" id="reset-btn">Send Reset Link</button>

        <div id="form-success" style="display:none;color:var(--success);font-size:13px;text-align:center;padding:14px;background:rgba(52,199,89,0.1);border-radius:var(--radius-md);border:1px solid rgba(52,199,89,0.2)"></div>
        <div id="form-error"   style="display:none;color:var(--danger);font-size:13px;text-align:center;padding:14px;background:rgba(255,59,48,0.1);border-radius:var(--radius-md);border:1px solid rgba(255,59,48,0.2)"></div>
      </form>

      <div class="auth-footer">
        <a href="/pages/login.html">← Back to sign in</a>
      </div>
    </div>

    <!-- STEP 2: Set new password (shown when ?type=recovery in URL) -->
    <div id="step-reset" style="display:none">
      <h1 class="auth-title">New password</h1>
      <p class="auth-subtitle">Choose a strong new password</p>

      <form class="auth-form" id="reset-form" onsubmit="return false">
        <div class="form-group">
          <label class="form-label" for="new-password">New Password</label>
          <div class="input-group">
            <input class="form-input" type="password" id="new-password" placeholder="Min. 8 characters" required minlength="8" />
            <button type="button" class="input-group__suffix" id="toggle-pw">👁</button>
          </div>
          <div class="password-strength"><div class="password-strength__bar" id="pw-bar"></div></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm-password">Confirm Password</label>
          <input class="form-input" type="password" id="confirm-password" placeholder="Repeat password" required />
          <span class="form-error" id="confirm-error"></span>
        </div>

        <button class="btn btn--primary btn--full" type="submit" id="set-pw-btn">Update Password</button>

        <div id="reset-error"   style="display:none;color:var(--danger);font-size:13px;text-align:center;padding:14px;background:rgba(255,59,48,0.1);border-radius:var(--radius-md);border:1px solid rgba(255,59,48,0.2)"></div>
        <div id="reset-success" style="display:none;color:var(--success);font-size:13px;text-align:center;padding:14px;background:rgba(52,199,89,0.1);border-radius:var(--radius-md);border:1px solid rgba(52,199,89,0.2)"></div>
      </form>
    </div>

  </div>
</div>

<script type="module">
  import { supabase } from '/js/supabase.js';
  import { toast, initTheme } from '/js/utils/helpers.js';

  initTheme();

  // Check if this is a recovery link
  const hash   = window.location.hash;
  const params = new URLSearchParams(hash.replace('#', '?'));
  const type   = params.get('type');

  if (type === 'recovery') {
    document.getElementById('step-request').style.display = 'none';
    document.getElementById('step-reset').style.display   = 'block';
  }

  // ── Forgot form ──────────────────────────────────────────
  const forgotForm = document.getElementById('forgot-form');
  const resetBtn   = document.getElementById('reset-btn');
  const succDiv    = document.getElementById('form-success');
  const errDiv     = document.getElementById('form-error');

  forgotForm?.addEventListener('submit', async () => {
    errDiv.style.display  = 'none';
    succDiv.style.display = 'none';
    const email = document.getElementById('email').value.trim();
    if (!email) { document.getElementById('email-error').textContent = 'Email required'; return; }

    resetBtn.disabled  = true;
    resetBtn.innerHTML = '<span class="spinner"></span> Sending…';

    try {
      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: `${location.origin}/pages/forgot-password.html`,
      });
      if (error) throw error;
      succDiv.textContent   = '✓ Reset link sent! Check your inbox (and spam folder).';
      succDiv.style.display = 'block';
      resetBtn.innerHTML    = 'Email sent';
    } catch (err) {
      errDiv.textContent   = err.message;
      errDiv.style.display = 'block';
      resetBtn.disabled    = false;
      resetBtn.innerHTML   = 'Send Reset Link';
    }
  });

  // ── Reset form ───────────────────────────────────────────
  const newPwInput = document.getElementById('new-password');
  const togglePw   = document.getElementById('toggle-pw');
  if (togglePw) {
    togglePw.addEventListener('click', () => {
      const show = newPwInput.type === 'password';
      newPwInput.type = show ? 'text' : 'password';
      togglePw.textContent = show ? '🙈' : '👁';
    });
  }

  const pwBar = document.getElementById('pw-bar');
  newPwInput?.addEventListener('input', () => {
    const v = newPwInput.value;
    let score = 0;
    if (v.length >= 8)          score++;
    if (/[A-Z]/.test(v))        score++;
    if (/[0-9]/.test(v))        score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;
    const colors = ['transparent','var(--danger)','var(--warning)','#f0b429','var(--success)'];
    pwBar.style.width      = `${score * 25}%`;
    pwBar.style.background = colors[score];
  });

  const resetForm  = document.getElementById('reset-form');
  const setPwBtn   = document.getElementById('set-pw-btn');
  const resetErr   = document.getElementById('reset-error');
  const resetSucc  = document.getElementById('reset-success');

  resetForm?.addEventListener('submit', async () => {
    resetErr.style.display  = 'none';
    resetSucc.style.display = 'none';
    const newPw   = newPwInput.value;
    const confirm = document.getElementById('confirm-password').value;
    if (newPw.length < 8) {
      document.getElementById('confirm-error').textContent = 'Password must be at least 8 characters';
      return;
    }
    if (newPw !== confirm) {
      document.getElementById('confirm-error').textContent = 'Passwords do not match';
      return;
    }

    setPwBtn.disabled  = true;
    setPwBtn.innerHTML = '<span class="spinner"></span> Updating…';

    try {
      const { error } = await supabase.auth.updateUser({ password: newPw });
      if (error) throw error;
      resetSucc.textContent   = '✓ Password updated! Redirecting to sign in…';
      resetSucc.style.display = 'block';
      setTimeout(() => location.href = '/pages/login.html', 2000);
    } catch (err) {
      resetErr.textContent   = err.message;
      resetErr.style.display = 'block';
      setPwBtn.disabled      = false;
      setPwBtn.innerHTML     = 'Update Password';
    }
  });
</script>
</body>
</html>
