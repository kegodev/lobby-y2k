<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Detail — Lobby Y2K</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <script src="/js/env.js"></script>
</head>
<body>
<nav class="nav" id="main-nav">
  <a href="/" class="nav__logo"><img src="https://res.cloudinary.com/duw82qno0/image/upload/v1782674045/C705ADF3-47CC-4FC6-A026-73B3F2F27355_ycltrb.png" alt="Lobby Y2K" /></a>
  <div class="nav__links"><a href="/" class="nav__link">Home</a><a href="/pages/orders.html" class="nav__link">← My Orders</a></div>
  <div class="nav__actions">
    <button class="nav__icon-btn" id="theme-toggle" onclick="handleThemeToggle()">🌙</button>
    <button class="nav__icon-btn" id="auth-btn">👤</button>
  </div>
</nav>
<main class="page page-enter">
  <div class="container" style="padding-top:40px;padding-bottom:80px;max-width:720px">
    <a href="/pages/orders.html" style="display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text-muted);margin-bottom:24px;transition:color .15s"
      onmouseenter="this.style.color='var(--violet)'" onmouseleave="this.style.color='var(--text-muted)'">← Back to orders</a>
    <div id="order-content"><div class="spinner" style="margin:60px auto;display:block"></div></div>
  </div>
</main>
<script type="module">
  import { initTheme, toggleTheme, formatPrice, statusBadgeHTML, formatDate } from '/js/utils/helpers.js';
  import { supabase } from '/js/supabase.js';
  import { OrdersService } from '/js/services/orders.js';

  initTheme();
  document.getElementById('theme-toggle').textContent = (localStorage.getItem('lobby-theme')||'dark') === 'dark' ? '🌙' : '☀️';
  window.handleThemeToggle = () => { const n = toggleTheme(); document.getElementById('theme-toggle').textContent = n === 'dark' ? '🌙' : '☀️'; };

  const { data: { user } } = await supabase.auth.getUser();
  if (!user) location.href = `/pages/login.html?redirect=${encodeURIComponent(location.href)}`;

  const authBtn = document.getElementById('auth-btn');
  if (authBtn) { authBtn.textContent = '👤'; authBtn.onclick = () => location.href = '/pages/profile.html'; }

  const orderId = new URLSearchParams(location.search).get('id');
  if (!orderId) location.href = '/pages/orders.html';

  const content = document.getElementById('order-content');
  try {
    const order = await OrdersService.getOrder(orderId);
    document.title = `Order #${order.id.slice(0,8).toUpperCase()} — Lobby Y2K`;
    content.innerHTML = `
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:28px">
        <div>
          <h1 class="section-title" style="font-size:1.8rem">Order <span class="text-gradient">#${order.id.slice(0,8).toUpperCase()}</span></h1>
          <p style="font-size:13px;color:var(--text-muted);margin-top:6px">Placed on ${formatDate(order.created_at)}</p>
        </div>
        ${statusBadgeHTML(order.status)}
      </div>

      <!-- ITEMS -->
      <div class="checkout-section" style="margin-bottom:20px">
        <div class="checkout-section__title"><div class="checkout-section__number">📦</div>Items</div>
        ${order.order_items?.map(item => {
          const img = item.product_images?.find(i=>i.is_primary)?.url || item.product_images?.[0]?.url || '';
          return `
            <div style="display:flex;gap:14px;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)">
              <div style="width:64px;height:64px;border-radius:var(--radius-md);background:var(--surface-2);overflow:hidden;flex-shrink:0">
                ${img ? `<img src="${img}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'" />` : ''}
              </div>
              <div style="flex:1">
                <div style="font-weight:700;font-size:14px">${item.product_name || item.products?.name || '—'}</div>
                <div style="font-size:12px;color:var(--text-muted)">
                  ${item.variant_info?.size ? `Size UK ${item.variant_info.size}` : ''}
                  ${item.variant_info?.color ? ` · ${item.variant_info.color}` : ''}
                </div>
                <div style="font-size:12px;color:var(--text-muted)">Qty: ${item.quantity}</div>
              </div>
              <div style="font-family:var(--font-display);font-weight:800;font-size:16px">${formatPrice(item.price * item.quantity)}</div>
            </div>
          `;
        }).join('') || '<p style="color:var(--text-muted)">No items</p>'}
      </div>

      <!-- TOTALS -->
      <div class="checkout-section" style="margin-bottom:20px">
        <div class="checkout-section__title"><div class="checkout-section__number">💰</div>Summary</div>
        <div class="summary-row"><span>Subtotal</span><span>${formatPrice(order.subtotal)}</span></div>
        <div class="summary-row">
          <span>Shipping</span>
          <span>${order.shipping > 0 ? formatPrice(order.shipping) : '<span style="color:var(--text-muted);font-style:italic">Pending confirmation</span>'}</span>
        </div>
        <div class="summary-row summary-row--total"><span>Total</span><span>${formatPrice(order.total)}</span></div>
        ${order.shipping === 0 ? `
          <div style="margin-top:12px;padding:12px;background:var(--violet-dim);border:1px solid rgba(123,47,255,.2);border-radius:var(--radius-md);font-size:13px;color:var(--text-secondary)">
            ℹ️ Shipping cost is being confirmed. Check your <a href="/pages/messages.html" style="color:var(--violet);font-weight:600">messages</a> for updates.
          </div>
        ` : ''}
      </div>

      <!-- SHIPPING ADDRESS -->
      <div class="checkout-section" style="margin-bottom:20px">
        <div class="checkout-section__title"><div class="checkout-section__number">📍</div>Ships To</div>
        <div style="font-size:14px;color:var(--text-secondary);line-height:1.8">
          <strong>${order.shipping_address?.full_name || ''}</strong><br/>
          ${order.shipping_address?.line1 || ''}<br/>
          ${order.shipping_address?.line2 ? order.shipping_address.line2 + '<br/>' : ''}
          ${order.shipping_address?.city || ''}, ${order.shipping_address?.state || ''} ${order.shipping_address?.postal_code || ''}<br/>
          ${order.shipping_address?.country || ''}
          ${order.shipping_address?.phone ? `<br/>📞 ${order.shipping_address.phone}` : ''}
        </div>
      </div>

      ${order.notes ? `
        <div class="checkout-section">
          <div class="checkout-section__title"><div class="checkout-section__number">📝</div>Notes</div>
          <p style="font-size:14px;color:var(--text-secondary)">${order.notes}</p>
        </div>
      ` : ''}

      <div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap">
        <button class="btn btn--outline" onclick="location.href='/pages/orders.html'">← All Orders</button>
        <button class="btn btn--ghost" onclick="location.href='/pages/messages.html'">✉️ Messages</button>
        <button class="btn btn--primary" onclick="location.href='/pages/search.html'">Shop More</button>
      </div>
    `;
  } catch(e) {
    content.innerHTML = `
      <div class="empty-state">
        <div class="empty-state__icon">😕</div>
        <h3 class="empty-state__title">Order not found</h3>
        <p class="empty-state__sub">${e.message}</p>
        <button class="btn btn--primary" onclick="location.href='/pages/orders.html'">My Orders</button>
      </div>`;
  }
</script>
</body>
</html>
