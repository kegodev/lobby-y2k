<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — Lobby Y2K</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <script src="/js/env.js"></script>
</head>
<body>

<nav class="nav" id="main-nav">
  <a href="/" class="nav__logo"><img src="https://res.cloudinary.com/duw82qno0/image/upload/v1782674045/C705ADF3-47CC-4FC6-A026-73B3F2F27355_ycltrb.png" alt="Lobby Y2K" /></a>
  <div class="nav__links">
    <a href="/" class="nav__link">Home</a>
    <a href="/pages/search.html" class="nav__link">Shop</a>
  </div>
  <div class="nav__actions">
    <button class="nav__icon-btn" onclick="location.href='/pages/search.html'">🔍</button>
    <button class="nav__icon-btn" onclick="requireAuthNav('/pages/wishlist.html')">♡</button>
    <button class="nav__icon-btn" onclick="requireAuthNav('/pages/cart.html')" style="position:relative">🛒<span class="cart-badge" style="display:none">0</span></button>
    <button class="nav__icon-btn" id="theme-toggle" onclick="handleThemeToggle()">🌙</button>
    <button class="nav__icon-btn" id="auth-btn">👤</button>
  </div>
</nav>

<main class="page page-enter">
  <div class="container">

    <!-- BREADCRUMB -->
    <nav style="display:flex;align-items:center;gap:8px;padding:24px 0 0;font-size:13px;color:var(--text-muted)">
      <a href="/" style="color:var(--text-muted);transition:color .15s" onmouseenter="this.style.color='var(--violet)'" onmouseleave="this.style.color='var(--text-muted)'">Home</a>
      <span>›</span>
      <a href="/pages/search.html" style="color:var(--text-muted);transition:color .15s" onmouseenter="this.style.color='var(--violet)'" onmouseleave="this.style.color='var(--text-muted)'">Shop</a>
      <span>›</span>
      <span id="breadcrumb-name" style="color:var(--text-secondary)">Loading…</span>
    </nav>

    <!-- PRODUCT DETAIL LAYOUT -->
    <div class="product-detail" id="product-detail">
      <!-- Skeleton state -->
      <div>
        <div class="skeleton" style="aspect-ratio:1;width:100%;border-radius:var(--radius-xl)"></div>
        <div style="display:flex;gap:10px;margin-top:14px">
          <div class="skeleton" style="width:80px;height:80px;border-radius:var(--radius-md)"></div>
          <div class="skeleton" style="width:80px;height:80px;border-radius:var(--radius-md)"></div>
          <div class="skeleton" style="width:80px;height:80px;border-radius:var(--radius-md)"></div>
        </div>
      </div>
      <div style="padding-top:16px">
        <div class="skeleton skeleton--text skeleton--short" style="margin-bottom:12px"></div>
        <div class="skeleton skeleton--text" style="height:36px;margin-bottom:16px"></div>
        <div class="skeleton skeleton--text skeleton--med" style="margin-bottom:24px"></div>
        <div class="skeleton skeleton--text" style="height:48px;margin-bottom:16px"></div>
      </div>
    </div>

    <!-- REVIEWS SECTION -->
    <div id="reviews-section" style="display:none;padding-bottom:80px">
      <div class="divider"></div>
      <h2 class="section-title" style="font-size:1.5rem;margin-bottom:24px">Reviews <span id="review-count-label" style="font-size:1rem;font-weight:400;color:var(--text-muted)"></span></h2>

      <!-- Write a review (logged in users) -->
      <div id="review-form-wrap" style="display:none;margin-bottom:32px">
        <div class="checkout-section">
          <div class="checkout-section__title">
            <div class="checkout-section__number">★</div>
            Write a Review
          </div>
          <div style="display:flex;gap:8px;margin-bottom:16px" id="star-picker">
            <span style="color:var(--text-muted);font-size:13px;align-self:center">Rating:</span>
            <span class="star-opt" data-val="1" style="font-size:28px;cursor:pointer;transition:transform .15s">☆</span>
            <span class="star-opt" data-val="2" style="font-size:28px;cursor:pointer;transition:transform .15s">☆</span>
            <span class="star-opt" data-val="3" style="font-size:28px;cursor:pointer;transition:transform .15s">☆</span>
            <span class="star-opt" data-val="4" style="font-size:28px;cursor:pointer;transition:transform .15s">☆</span>
            <span class="star-opt" data-val="5" style="font-size:28px;cursor:pointer;transition:transform .15s">☆</span>
          </div>
          <div class="form-group" style="margin-bottom:12px">
            <input class="form-input" type="text" id="review-title" placeholder="Title (optional)" />
          </div>
          <div class="form-group" style="margin-bottom:16px">
            <textarea class="form-input" id="review-body" rows="3" placeholder="Share your thoughts…" style="resize:vertical"></textarea>
          </div>
          <button class="btn btn--primary" id="submit-review-btn">Submit Review</button>
        </div>
      </div>

      <div id="reviews-list" style="display:flex;flex-direction:column;gap:16px"></div>
    </div>

    <!-- RELATED PRODUCTS -->
    <div id="related-section" style="display:none;padding-bottom:80px">
      <div class="divider"></div>
      <div class="section-header">
        <h2 class="section-title" style="font-size:1.5rem">More from <span id="related-brand" class="text-gradient"></span></h2>
      </div>
      <div class="product-grid" id="related-grid"></div>
    </div>

  </div>
</main>

<nav class="bottom-nav">
  <a href="/" class="bottom-nav__item"><span class="icon">🏠</span><span class="bottom-nav__label">Home</span></a>
  <a href="/pages/search.html" class="bottom-nav__item"><span class="icon">🔍</span><span class="bottom-nav__label">Shop</span></a>
  <a href="/pages/wishlist.html" class="bottom-nav__item"><span class="icon">♡</span><span class="bottom-nav__label">Saved</span></a>
  <a href="/pages/cart.html" class="bottom-nav__item" style="position:relative"><span class="icon">🛒</span><span class="cart-badge" style="display:none">0</span><span class="bottom-nav__label">Cart</span></a>
  <a href="#" class="bottom-nav__item" id="account-bottom"><span class="icon">👤</span><span class="bottom-nav__label">Account</span></a>
</nav>

<script type="module">
  import { initTheme, toggleTheme, updateCartBadge, formatPrice, getDiscountPercent, toast, productCardHTML, renderStars, timeAgo } from '/js/utils/helpers.js';
  import { supabase } from '/js/supabase.js';
  import ProductsService from '/js/services/products.js';
  import CartService from '/js/services/cart.js';
  import { WishlistService } from '/js/services/misc.js';
  import { refreshNavAuth } from '/js/utils/page-shell.js';

  initTheme();
  document.getElementById('theme-toggle').textContent = (localStorage.getItem('lobby-theme') || 'dark') === 'dark' ? '🌙' : '☀️';
  window.handleThemeToggle = () => { const n = toggleTheme(); document.getElementById('theme-toggle').textContent = n === 'dark' ? '🌙' : '☀️'; };
  window.addEventListener('scroll', () => document.getElementById('main-nav').classList.toggle('scrolled', scrollY > 20), { passive: true });

  const productId = new URLSearchParams(location.search).get('id');
  if (!productId) { location.href = '/pages/search.html'; }

  let product        = null;
  let selectedVariant = null;
  let selectedRating  = 0;

  // ── Load product ─────────────────────────────────────────
  async function loadProduct() {
    try {
      product = await ProductsService.getProduct(productId);
      if (!product) { location.href = '/pages/404.html'; return; }

      document.title = `${product.name} — Lobby Y2K`;
      document.getElementById('breadcrumb-name').textContent = product.name;

      const images   = product.product_images?.sort((a,b) => a.position - b.position) || [];
      const primary  = images.find(i => i.is_primary) || images[0];
      const variants = product.product_variants || [];

      // Unique colors & sizes
      const colors = [...new Map(variants.map(v => [v.color, v])).values()];
      const sizes  = [...new Set(variants.map(v => v.size))].sort((a,b) => parseFloat(a)-parseFloat(b));

      const disc = getDiscountPercent(product);
      const price = product.sale_price || product.base_price;

      // ── Build detail HTML ────────────────────────────────
      document.getElementById('product-detail').innerHTML = `
        <!-- GALLERY -->
        <div class="product-gallery">
          <div class="product-gallery__main" id="main-image-wrap">
            <img id="main-image" src="${primary?.url || 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=800'}" alt="${product.name}" />
          </div>
          ${images.length > 1 ? `
            <div class="product-gallery__thumbs">
              ${images.map((img, i) => `
                <div class="product-gallery__thumb ${i === 0 ? 'active' : ''}" data-url="${img.url}" onclick="switchImage('${img.url}', this)">
                  <img src="${img.url}" alt="View ${i+1}" loading="lazy" />
                </div>
              `).join('')}
            </div>
          ` : ''}
        </div>

        <!-- INFO -->
        <div class="product-info">
          <div class="product-info__brand">${product.brand}</div>
          <h1 class="product-info__name">${product.name}</h1>

          <div class="product-info__rating">
            <span class="stars" style="font-size:18px">${renderStars(product.rating)}</span>
            <span style="font-size:14px;color:var(--text-secondary)">${product.rating?.toFixed(1) || '—'}</span>
            <span style="font-size:13px;color:var(--text-muted)">(${(product.review_count||0).toLocaleString()} reviews)</span>
          </div>

          <div class="product-info__price">
            <span class="current-price">${formatPrice(price)}</span>
            ${disc > 0 ? `
              <span class="original-price">${formatPrice(product.base_price)}</span>
              <span class="discount-badge">-${disc}%</span>
            ` : ''}
          </div>

          <!-- COLOR PICKER -->
          ${colors.length > 0 ? `
            <div class="variant-picker">
              <div class="variant-picker__label">Color: <span id="color-label">${colors[0]?.color || ''}</span></div>
              <div class="color-swatches">
                ${colors.map((c, i) => `
                  <div
                    class="color-swatch ${i === 0 ? 'active' : ''}"
                    style="background:${c.color_hex || '#888'}"
                    title="${c.color}"
                    data-color="${c.color}"
                    onclick="selectColor('${c.color}', this)"
                  ></div>
                `).join('')}
              </div>
            </div>
          ` : ''}

          <!-- SIZE PICKER -->
          ${sizes.length > 0 ? `
            <div class="variant-picker" style="margin-bottom:24px">
              <div class="variant-picker__label">Size (UK): <span id="size-label">Select a size</span></div>
              <div class="size-grid" id="size-grid">
                ${sizes.map(s => {
                  const variantsForSize = variants.filter(v => v.size === s);
                  const inStock = variantsForSize.some(v => v.stock > 0);
                  return `
                    <div
                      class="size-btn ${!inStock ? 'out-of-stock' : ''}"
                      data-size="${s}"
                      ${inStock ? `onclick="selectSize('${s}', this)"` : ''}
                    >${s}</div>
                  `;
                }).join('')}
              </div>
            </div>
          ` : ''}

          <!-- STOCK STATUS -->
          <div id="stock-status" style="font-size:13px;color:var(--text-muted);margin-bottom:16px"></div>

          <!-- DESCRIPTION -->
          ${product.description ? `
            <p style="font-size:15px;color:var(--text-secondary);line-height:1.7;margin-bottom:28px">${product.description}</p>
          ` : ''}

          <!-- ADD TO CART -->
          <div class="add-to-cart-bar">
            <button class="btn btn--primary" id="add-to-cart-btn" onclick="addToCart()">
              🛒 Add to Cart
            </button>
            <button class="btn btn--outline btn--icon" id="wishlist-btn" aria-label="Wishlist" onclick="handleWishlist()" style="font-size:22px">♡</button>
          </div>

          <!-- BUY NOW -->
          <button class="btn btn--outline btn--full" style="margin-top:12px" onclick="buyNow()">
            ⚡ Buy Now
          </button>

          <!-- DELIVERY INFO -->
          <div style="margin-top:28px;padding:20px;background:var(--surface-1);border:1px solid var(--border);border-radius:var(--radius-md)">
            <div style="display:flex;gap:16px;flex-wrap:wrap">
              <div style="flex:1;min-width:140px">
                <div style="font-size:13px;font-weight:700;color:var(--text-primary);margin-bottom:4px">📦 Shipping</div>
                <div style="font-size:13px;color:var(--text-muted)">Calculated at checkout. Admin will confirm shipping cost.</div>
              </div>
              <div style="flex:1;min-width:140px">
                <div style="font-size:13px;font-weight:700;color:var(--text-primary);margin-bottom:4px">↩ Returns</div>
                <div style="font-size:13px;color:var(--text-muted)">7-day returns on unworn items in original packaging.</div>
              </div>
            </div>
          </div>
        </div>
      `;

      // Set initial state
      if (colors.length > 0) window._selectedColor = colors[0].color;
      updateVariant();

      // Check wishlist
      const { data: { user } } = await supabase.auth.getUser();
      if (user) {
        const wishlisted = await WishlistService.isWishlisted(productId);
        const wBtn = document.getElementById('wishlist-btn');
        if (wBtn) { wBtn.textContent = wishlisted ? '♥' : '♡'; wBtn.classList.toggle('active', wishlisted); }
        document.getElementById('review-form-wrap').style.display = 'block';
      }

      // Load reviews & related
      loadReviews();
      loadRelated();
      updateCartBadge();

    } catch (err) {
      document.getElementById('product-detail').innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-state__icon">😕</div>
          <h3 class="empty-state__title">Product not found</h3>
          <p class="empty-state__sub">${err.message}</p>
          <button class="btn btn--primary" onclick="location.href='/pages/search.html'">Browse All</button>
        </div>
      `;
    }
  }

  // ── Image gallery ────────────────────────────────────────
  window.switchImage = (url, el) => {
    document.getElementById('main-image').src = url;
    document.querySelectorAll('.product-gallery__thumb').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  };

  // ── Variant selection ────────────────────────────────────
  window._selectedColor = null;
  window._selectedSize  = null;

  window.selectColor = (color, el) => {
    window._selectedColor = color;
    document.getElementById('color-label').textContent = color;
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    updateVariant();
  };

  window.selectSize = (size, el) => {
    if (el.classList.contains('out-of-stock')) return;
    window._selectedSize = size;
    document.getElementById('size-label').textContent = `UK ${size}`;
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    updateVariant();
  };

  function updateVariant() {
    if (!product) return;
    const variants = product.product_variants || [];
    selectedVariant = variants.find(v =>
      (!window._selectedColor || v.color === window._selectedColor) &&
      (!window._selectedSize  || v.size  === window._selectedSize)
    ) || null;

    const stockEl = document.getElementById('stock-status');
    if (stockEl) {
      if (selectedVariant) {
        if (selectedVariant.stock > 10) {
          stockEl.innerHTML = `<span style="color:var(--success)">● In Stock</span>`;
        } else if (selectedVariant.stock > 0) {
          stockEl.innerHTML = `<span style="color:var(--warning)">● Only ${selectedVariant.stock} left</span>`;
        } else {
          stockEl.innerHTML = `<span style="color:var(--danger)">● Out of Stock</span>`;
        }
      } else {
        stockEl.textContent = '';
      }
    }
  }

  // ── Cart actions ─────────────────────────────────────────
  window.addToCart = async () => {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) { toast('Sign in to add to cart', 'info'); location.href = `/pages/login.html?redirect=${encodeURIComponent(location.href)}`; return; }

    if (!window._selectedSize) { toast('Please select a size', 'warning'); return; }
    if (!selectedVariant || selectedVariant.stock === 0) { toast('This variant is out of stock', 'error'); return; }

    const btn = document.getElementById('add-to-cart-btn');
    btn.disabled  = true;
    btn.innerHTML = '<span class="spinner"></span>';

    try {
      await CartService.addItem({
        productId:  productId,
        variantId:  selectedVariant.id,
        price:      product.sale_price || product.base_price,
        quantity:   1,
      });
      toast(`${product.name} added to cart!`, 'success');
      updateCartBadge();
      btn.innerHTML = '✓ Added!';
      setTimeout(() => { btn.disabled = false; btn.innerHTML = '🛒 Add to Cart'; }, 2000);
    } catch (err) {
      toast(err.message || 'Failed to add to cart', 'error');
      btn.disabled  = false;
      btn.innerHTML = '🛒 Add to Cart';
    }
  };

  window.buyNow = async () => {
    await addToCart();
    setTimeout(() => location.href = '/pages/cart.html', 400);
  };

  window.handleWishlist = async () => {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) { toast('Sign in to save to wishlist', 'info'); return; }
    const btn  = document.getElementById('wishlist-btn');
    const added = await WishlistService.toggleWishlist(productId);
    btn.textContent = added ? '♥' : '♡';
    btn.classList.toggle('active', added);
    toast(added ? 'Saved to wishlist' : 'Removed from wishlist', added ? 'success' : 'info');
  };

  // ── Reviews ──────────────────────────────────────────────
  async function loadReviews() {
    const section = document.getElementById('reviews-section');
    section.style.display = 'block';

    const reviews = await ProductsService.getReviews(productId);
    document.getElementById('review-count-label').textContent = `(${reviews.length})`;

    const list = document.getElementById('reviews-list');
    if (!reviews.length) {
      list.innerHTML = `<p style="color:var(--text-muted);font-size:14px">No reviews yet — be the first!</p>`;
      return;
    }
    list.innerHTML = reviews.map(r => `
      <div style="padding:20px;background:var(--surface-1);border:1px solid var(--border);border-radius:var(--radius-lg)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div>
            <span style="font-family:var(--font-display);font-weight:700;font-size:14px">@${r.profiles?.username || 'user'}</span>
            <span class="stars" style="margin-left:10px;font-size:14px">${renderStars(r.rating)}</span>
          </div>
          <span style="font-size:12px;color:var(--text-muted)">${timeAgo(r.created_at)}</span>
        </div>
        ${r.title ? `<div style="font-weight:600;font-size:14px;margin-bottom:4px">${r.title}</div>` : ''}
        ${r.body  ? `<div style="font-size:14px;color:var(--text-secondary);line-height:1.6">${r.body}</div>` : ''}
      </div>
    `).join('');
  }

  // Star picker
  document.querySelectorAll('.star-opt').forEach(star => {
    star.addEventListener('click', () => {
      selectedRating = parseInt(star.dataset.val);
      document.querySelectorAll('.star-opt').forEach((s, i) => {
        s.textContent = i < selectedRating ? '★' : '☆';
        s.style.color = i < selectedRating ? '#FFD700' : 'var(--text-muted)';
      });
    });
    star.addEventListener('mouseenter', () => {
      const val = parseInt(star.dataset.val);
      document.querySelectorAll('.star-opt').forEach((s, i) => {
        s.textContent = i < val ? '★' : '☆';
        s.style.color = i < val ? '#FFD700' : 'var(--text-muted)';
      });
    });
    star.addEventListener('mouseleave', () => {
      document.querySelectorAll('.star-opt').forEach((s, i) => {
        s.textContent = i < selectedRating ? '★' : '☆';
        s.style.color = i < selectedRating ? '#FFD700' : 'var(--text-muted)';
      });
    });
  });

  document.getElementById('submit-review-btn')?.addEventListener('click', async () => {
    if (!selectedRating) { toast('Please select a rating', 'warning'); return; }
    const btn = document.getElementById('submit-review-btn');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
    try {
      await ProductsService.addReview({
        productId,
        rating: selectedRating,
        title:  document.getElementById('review-title').value.trim(),
        body:   document.getElementById('review-body').value.trim(),
      });
      toast('Review submitted!', 'success');
      document.getElementById('review-title').value = '';
      document.getElementById('review-body').value  = '';
      selectedRating = 0;
      document.querySelectorAll('.star-opt').forEach(s => { s.textContent = '☆'; s.style.color = ''; });
      loadReviews();
    } catch (err) {
      toast(err.message, 'error');
    }
    btn.disabled = false; btn.innerHTML = 'Submit Review';
  });

  // ── Related products ─────────────────────────────────────
  async function loadRelated() {
    if (!product) return;
    const related = await ProductsService.getRelated(product, 4);
    if (!related.length) return;
    const sec = document.getElementById('related-section');
    sec.style.display = 'block';
    document.getElementById('related-brand').textContent = product.brand;
    document.getElementById('related-grid').innerHTML = related.map(p => productCardHTML(p)).join('');
  }

  loadProduct();
  refreshNavAuth();
</script>
</body>
</html>
