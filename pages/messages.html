<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — Lobby Y2K</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <script src="/js/env.js"></script>
</head>
<body>
<nav class="nav" id="main-nav">
  <a href="/" class="nav__logo"><img src="https://res.cloudinary.com/duw82qno0/image/upload/v1782674045/C705ADF3-47CC-4FC6-A026-73B3F2F27355_ycltrb.png" alt="Lobby Y2K" /></a>
  <div class="nav__links"><a href="/" class="nav__link">Home</a><a href="/pages/search.html" class="nav__link">Shop</a></div>
  <div class="nav__actions">
    <button class="nav__icon-btn" onclick="location.href='/pages/cart.html'" style="position:relative">🛒<span class="cart-badge" style="display:none">0</span></button>
    <button class="nav__icon-btn" id="theme-toggle" onclick="handleThemeToggle()">🌙</button>
    <button class="nav__icon-btn" id="auth-btn">👤</button>
  </div>
</nav>

<main class="page page-enter">
  <div class="container" style="padding-top:40px;padding-bottom:80px;max-width:720px">
    <div class="section-header" style="margin-bottom:32px">
      <div>
        <h1 class="section-title">My <span class="text-gradient">Messages</span></h1>
        <p class="section-subtitle">Communications from the Lobby team</p>
      </div>
      <a href="/pages/profile.html" class="btn btn--ghost btn--sm">← Account</a>
    </div>

    <div id="messages-list">
      <div class="spinner" style="margin:60px auto;display:block"></div>
    </div>

    <!-- MESSAGE DETAIL MODAL -->
    <div class="modal-overlay" id="msg-modal">
      <div class="modal">
        <div class="modal__header">
          <h3 class="modal__title" id="modal-subject">Message</h3>
          <button class="modal__close" onclick="closeModal()">✕</button>
        </div>
        <div id="modal-meta" style="font-size:12px;color:var(--text-muted);font-family:var(--font-mono);margin-bottom:20px"></div>
        <div id="modal-body" style="font-size:15px;color:var(--text-secondary);line-height:1.8;white-space:pre-wrap"></div>
        <div id="modal-order" style="display:none;margin-top:20px;padding:16px;background:var(--surface-2);border-radius:var(--radius-md)"></div>
      </div>
    </div>
  </div>
</main>

<nav class="bottom-nav">
  <a href="/" class="bottom-nav__item"><span class="icon">🏠</span><span class="bottom-nav__label">Home</span></a>
  <a href="/pages/search.html" class="bottom-nav__item"><span class="icon">🔍</span><span class="bottom-nav__label">Shop</span></a>
  <a href="/pages/wishlist.html" class="bottom-nav__item"><span class="icon">♡</span><span class="bottom-nav__label">Saved</span></a>
  <a href="/pages/cart.html" class="bottom-nav__item" style="position:relative"><span class="icon">🛒</span><span class="cart-badge" style="display:none">0</span><span class="bottom-nav__label">Cart</span></a>
  <a href="/pages/profile.html" class="bottom-nav__item"><span class="icon">👤</span><span class="bottom-nav__label">Account</span></a>
</nav>

<script type="module">
  import { initTheme, toggleTheme, updateCartBadge, toast, timeAgo, formatDate, statusBadgeHTML, formatPrice } from '/js/utils/helpers.js';
  import { supabase } from '/js/supabase.js';
  import { MessagesService } from '/js/services/misc.js';

  initTheme();
  document.getElementById('theme-toggle').textContent = (localStorage.getItem('lobby-theme')||'dark') === 'dark' ? '🌙' : '☀️';
  window.handleThemeToggle = () => { const n = toggleTheme(); document.getElementById('theme-toggle').textContent = n === 'dark' ? '🌙' : '☀️'; };
  window.addEventListener('scroll', () => document.getElementById('main-nav').classList.toggle('scrolled', scrollY > 20), { passive: true });

  const { data: { user } } = await supabase.auth.getUser();
  if (!user) location.href = `/pages/login.html?redirect=${encodeURIComponent(location.href)}`;

  const authBtn = document.getElementById('auth-btn');
  if (authBtn) { authBtn.textContent = '👤'; authBtn.onclick = () => location.href = '/pages/profile.html'; }
  updateCartBadge();

  const list = document.getElementById('messages-list');
  let messages = [];

  try {
    messages = await MessagesService.getMyMessages();

    if (!messages.length) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-state__icon">✉️</div>
          <h3 class="empty-state__title">No messages yet</h3>
          <p class="empty-state__sub">When the Lobby team sends you a message about your orders or account, it'll appear here.</p>
          <button class="btn btn--outline" onclick="location.href='/pages/orders.html'">View Orders</button>
        </div>`;
      return;
    }

    list.innerHTML = messages.map((msg, idx) => `
      <div class="message-card ${!msg.is_read ? 'unread' : ''}" onclick="openMessage(${idx})" id="msg-card-${idx}">
        <div class="message-card__icon">✉️</div>
        <div style="flex:1;min-width:0">
          <div class="message-card__meta">${timeAgo(msg.created_at)}${msg.orders ? ' · Order #' + msg.order_id?.slice(0,8).toUpperCase() : ''}</div>
          <div class="message-card__subject">
            ${!msg.is_read ? '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--violet);margin-right:8px;vertical-align:middle"></span>' : ''}
            ${msg.subject}
          </div>
          <div class="message-card__body">${msg.body}</div>
        </div>
      </div>
    `).join('');

  } catch(e) {
    list.innerHTML = `<p style="color:var(--danger)">${e.message}</p>`;
  }

  window.openMessage = async (idx) => {
    const msg = messages[idx];
    document.getElementById('modal-subject').textContent = msg.subject;
    document.getElementById('modal-meta').textContent    = `Received ${formatDate(msg.created_at)}${msg.order_id ? ' · Re: Order #' + msg.order_id.slice(0,8).toUpperCase() : ''}`;
    document.getElementById('modal-body').textContent    = msg.body;

    const orderBox = document.getElementById('modal-order');
    if (msg.orders) {
      orderBox.style.display = 'block';
      orderBox.innerHTML = `
        <div style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">Linked Order</div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-family:var(--font-mono);font-size:13px">Order #${msg.order_id?.slice(0,8).toUpperCase()}</span>
          <div style="display:flex;align-items:center;gap:10px">
            ${statusBadgeHTML(msg.orders.status)}
            <span style="font-weight:700">${formatPrice(msg.orders.total)}</span>
          </div>
        </div>
        <button class="btn btn--outline btn--sm" style="margin-top:12px" onclick="location.href='/pages/orders.html'">View Order</button>
      `;
    } else {
      orderBox.style.display = 'none';
    }

    document.getElementById('msg-modal').classList.add('open');

    // Mark as read
    if (!msg.is_read) {
      try {
        await MessagesService.markRead(msg.id);
        msg.is_read = true;
        const card = document.getElementById(`msg-card-${idx}`);
        card?.classList.remove('unread');
        // Remove the dot
        const dot = card?.querySelector('span[style*="border-radius:50%"]');
        dot?.remove();
      } catch(_) {}
    }
  };

  window.closeModal = () => {
    document.getElementById('msg-modal').classList.remove('open');
  };

  // Close on overlay click
  document.getElementById('msg-modal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('msg-modal')) closeModal();
  });

  // Close on Escape
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
