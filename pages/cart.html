<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart — Lobby Y2K</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <script src="/js/env.js"></script>
</head>
<body>

<nav class="nav" id="main-nav">
  <a href="/" class="nav__logo"><img src="https://res.cloudinary.com/duw82qno0/image/upload/v1782674045/C705ADF3-47CC-4FC6-A026-73B3F2F27355_ycltrb.png" alt="Lobby Y2K" /></a>
  <div class="nav__links">
    <a href="/" class="nav__link">Home</a>
    <a href="/pages/search.html" class="nav__link">Shop</a>
  </div>
  <div class="nav__actions">
    <button class="nav__icon-btn" onclick="location.href='/pages/search.html'">🔍</button>
    <button class="nav__icon-btn" onclick="location.href='/pages/wishlist.html'">♡</button>
    <button class="nav__icon-btn" style="position:relative">🛒<span class="cart-badge" style="display:none">0</span></button>
    <button class="nav__icon-btn" id="theme-toggle" onclick="handleThemeToggle()">🌙</button>
    <button class="nav__icon-btn" id="auth-btn">👤</button>
  </div>
</nav>

<main class="page page-enter">
  <div class="container">
    <div style="display:flex;align-items:center;justify-content:space-between;padding-top:40px;margin-bottom:32px">
      <h1 class="section-title">Your <span class="text-gradient">Cart</span></h1>
      <button class="btn btn--ghost btn--sm" id="clear-cart-btn" onclick="clearCart()" style="display:none">Clear Cart</button>
    </div>

    <div class="cart-layout" id="cart-layout">
      <!-- Loading state -->
      <div id="cart-items-col">
        <div style="display:flex;flex-direction:column;gap:16px">
          <div class="skeleton" style="height:130px;border-radius:var(--radius-lg)"></div>
          <div class="skeleton" style="height:130px;border-radius:var(--radius-lg)"></div>
        </div>
      </div>
      <div id="cart-summary-col">
        <div class="skeleton" style="height:300px;border-radius:var(--radius-lg)"></div>
      </div>
    </div>
  </div>
</main>

<nav class="bottom-nav">
  <a href="/" class="bottom-nav__item"><span class="icon">🏠</span><span class="bottom-nav__label">Home</span></a>
  <a href="/pages/search.html" class="bottom-nav__item"><span class="icon">🔍</span><span class="bottom-nav__label">Shop</span></a>
  <a href="/pages/wishlist.html" class="bottom-nav__item"><span class="icon">♡</span><span class="bottom-nav__label">Saved</span></a>
  <a href="/pages/cart.html" class="bottom-nav__item active" style="position:relative"><span class="icon">🛒</span><span class="cart-badge" style="display:none">0</span><span class="bottom-nav__label">Cart</span></a>
  <a href="#" class="bottom-nav__item" id="account-bottom"><span class="icon">👤</span><span class="bottom-nav__label">Account</span></a>
</nav>

<script type="module">
  import { initTheme, toggleTheme, updateCartBadge, formatPrice, toast } from '/js/utils/helpers.js';
  import { supabase } from '/js/supabase.js';
  import CartService from '/js/services/cart.js';
  import { refreshNavAuth } from '/js/utils/page-shell.js';

  initTheme();
  document.getElementById('theme-toggle').textContent = (localStorage.getItem('lobby-theme')||'dark') === 'dark' ? '🌙' : '☀️';
  window.handleThemeToggle = () => { const n = toggleTheme(); document.getElementById('theme-toggle').textContent = n === 'dark' ? '🌙' : '☀️'; };
  window.addEventListener('scroll', () => document.getElementById('main-nav').classList.toggle('scrolled', scrollY > 20), { passive: true });

  // Guard: must be logged in
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) {
    location.href = `/pages/login.html?redirect=${encodeURIComponent(location.href)}`;
  }

  refreshNavAuth();

  let cartData = null;

  async function loadCart() {
    try {
      cartData = await CartService.getCart();
      renderCart(cartData);
      updateCartBadge();
    } catch (err) {
      document.getElementById('cart-items-col').innerHTML = `<p style="color:var(--danger)">${err.message}</p>`;
    }
  }

  function renderCart({ cart, items, total, count }) {
    const itemsCol   = document.getElementById('cart-items-col');
    const summaryCol = document.getElementById('cart-summary-col');
    const clearBtn   = document.getElementById('clear-cart-btn');

    if (!items || items.length === 0) {
      document.getElementById('cart-layout').innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-state__icon">🛒</div>
          <h3 class="empty-state__title">Your cart is empty</h3>
          <p class="empty-state__sub">Add some heat to your cart and come back here.</p>
          <button class="btn btn--primary" onclick="location.href='/pages/search.html'">Shop Now</button>
        </div>
      `;
      return;
    }

    clearBtn.style.display = 'block';

    itemsCol.innerHTML = `
      <div style="display:flex;flex-direction:column;gap:16px" id="items-list">
        ${items.map(item => cartItemHTML(item)).join('')}
      </div>
    `;

    summaryCol.innerHTML = `
      <div class="order-summary">
        <h3 style="font-family:var(--font-display);font-size:1.1rem;font-weight:800;margin-bottom:20px">Order Summary</h3>

        ${items.map(item => `
          <div class="summary-row">
            <span style="color:var(--text-secondary);font-size:13px">${item.products?.name} × ${item.quantity}</span>
            <span style="font-weight:600">${formatPrice(item.price * item.quantity)}</span>
          </div>
        `).join('')}

        <div class="summary-row">
          <span>Subtotal</span>
          <span style="font-weight:600">${formatPrice(total)}</span>
        </div>
        <div class="summary-row">
          <span>Shipping</span>
          <span style="color:var(--text-muted);font-style:italic">To be confirmed</span>
        </div>
        <div class="summary-row summary-row--total">
          <span>Total</span>
          <span>${formatPrice(total)}</span>
        </div>

        <div style="margin-top:8px;padding:12px;background:var(--violet-dim);border:1px solid rgba(123,47,255,0.2);border-radius:var(--radius-md);font-size:12px;color:var(--text-secondary)">
          ℹ️ Shipping cost will be confirmed via message after order placement.
        </div>

        <button class="btn btn--primary btn--full" style="margin-top:20px" onclick="location.href='/pages/checkout.html'">
          Proceed to Checkout →
        </button>
        <button class="btn btn--ghost btn--full" style="margin-top:10px" onclick="location.href='/pages/search.html'">
          Continue Shopping
        </button>
      </div>
    `;
  }

  function cartItemHTML(item) {
    const img   = item.image || 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=200';
    const price = formatPrice(item.price * item.quantity);
    return `
      <div class="cart-item" id="cart-item-${item.id}">
        <img class="cart-item__image" src="${img}" alt="${item.products?.name}" loading="lazy"
          onerror="this.src='https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=200'"
          onclick="location.href='/pages/product.html?id=${item.product_id}'" style="cursor:pointer" />
        <div class="cart-item__info">
          <div class="cart-item__brand">${item.products?.brand || ''}</div>
          <div class="cart-item__name">${item.products?.name || 'Product'}</div>
          <div class="cart-item__variant">
            ${item.product_variants ? `Size UK ${item.product_variants.size} · ${item.product_variants.color}` : ''}
          </div>
          <div class="quantity-control">
            <button class="qty-btn" onclick="updateQty('${item.id}', ${item.quantity - 1})">−</button>
            <span class="qty-value">${item.quantity}</span>
            <button class="qty-btn" onclick="updateQty('${item.id}', ${item.quantity + 1})">+</button>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
          <span class="cart-item__price">${price}</span>
          <button class="cart-item__remove" onclick="removeItem('${item.id}')">🗑</button>
        </div>
      </div>
    `;
  }

  window.updateQty = async (itemId, newQty) => {
    try {
      await CartService.updateQuantity(itemId, newQty);
      loadCart();
    } catch (err) {
      toast(err.message, 'error');
    }
  };

  window.removeItem = async (itemId) => {
    const el = document.getElementById(`cart-item-${itemId}`);
    if (el) { el.style.opacity = '0.4'; el.style.pointerEvents = 'none'; }
    try {
      await CartService.removeItem(itemId);
      toast('Item removed', 'info');
      loadCart();
    } catch (err) {
      toast(err.message, 'error');
      if (el) { el.style.opacity = '1'; el.style.pointerEvents = ''; }
    }
  };

  window.clearCart = async () => {
    if (!confirm('Remove all items from your cart?')) return;
    try {
      await CartService.clearCart();
      toast('Cart cleared', 'info');
      loadCart();
    } catch (err) {
      toast(err.message, 'error');
    }
  };

  loadCart();
</script>
</body>
</html>
